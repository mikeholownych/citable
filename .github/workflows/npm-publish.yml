name: npm publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish; must match package.json'
        required: true
        type: string

permissions: {}

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish citable to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          expected="${{ inputs.version }}"
          test "${GITHUB_REF_TYPE}" = "tag"
          test "${GITHUB_REF_NAME}" = "v${expected}"
          if [[ "${package_version}" != "${expected}" ]]; then
            echo "::error::package.json version ${package_version} does not match requested release ${expected}"
            exit 1
          fi
          node scripts/release-process.js validate "${expected}"

      - name: Verify tag is based on main
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::release tag is not based on origin/main"
            exit 1
          fi

      - name: Refuse duplicate npm version
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          set +e
          npm view "${package_name}@${package_version}" version --json >/tmp/npm-view-version.json 2>/tmp/npm-view-version.err
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "::error::${package_name}@${package_version} already exists on npm"
            cat /tmp/npm-view-version.json
            exit 1
          fi
          echo "Package ${package_name}@${package_version} not yet published - OK to publish"

      - name: Test
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run --json

      - name: Publish
        run: npm publish --access public --provenance

  record-state:
    name: Record published-unfinalized state
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Record published-unfinalized state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          test "${GITHUB_REF_TYPE}" = "tag"
          test "${GITHUB_REF_NAME}" = "v${version}"
          npm run build:dist
          mkdir -p /tmp/release-evidence
          gh release download "v${version}" --pattern 'release-manifest.json' --pattern 'release-state.json' --pattern 'resource-data.json' --pattern 'llms.txt' --dir /tmp/release-evidence
          node scripts/release-governance.js state-publish /tmp/release-evidence/release-manifest.json /tmp/release-evidence/release-state.json "github:${GITHUB_ACTOR}"
          gh release upload "v${version}" /tmp/release-evidence/release-state.json --clobber
