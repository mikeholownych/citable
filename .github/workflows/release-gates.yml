name: release-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  npm-package:
    name: npm package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Build dist (required for installer integration tests)
        run: npm run build:dist

      - name: Full test suite (unit + integration)
        run: npm test

      - name: E2E package test
        shell: bash
        run: npm run test:e2e

      - run: npm pack --dry-run

      - name: Pack package
        shell: bash
        run: |
          npm pack --json 2>/dev/null > npm-pack.json
          node -e "const fs = require('node:fs'); const pack = JSON.parse(fs.readFileSync('npm-pack.json', 'utf8'))[0]; fs.writeFileSync('npm-pack-filename.txt', pack.filename);"

      - name: Install from packed tarball
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          home="$tmp/home"
          mkdir -p "$home"
          tarball="$(cat npm-pack-filename.txt)"
          cp "$tarball" "$tmp/"
          cd "$tmp"
          HOME="$home" npx "./$tarball" install --providers=claude,codex,cursor --project --yes
          test -f .claude/skills/citable/SKILL.md
          test -f .agents/skills/citable/SKILL.md
          test -f .cursor/skills/citable/SKILL.md
          HOME="$home" npx "./$tarball" install --providers=claude,codex,cursor --project --yes
